name: Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Verify uv installation
        run: uv --version

      - name: Create virtual environment
        run: uv venv .venv

      - name: Install dependencies
        run: uv pip install -e ".[dev]"

      - name: Run linter
        run: uv run ruff check .

      - name: Run formatter check
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Test entry point resolves
        run: |
          uv run python -c "import importlib.util; spec = importlib.util.find_spec('server.app'); assert spec and spec.origin and spec.origin.endswith('app.py'), spec; from server.app import main; assert callable(main); print('Entry point server.app:main resolves')"
